<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | PDI Achievers Mentorship Association</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/jpeg" href="https://www.pdimentorshipassociation.org/PDI.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, var(--color-navy-950), var(--color-navy-900));
      color: var(--text-inverse);
      padding: var(--sp-4);
    }
    .error-page .code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 16vw, 9rem);
      color: var(--color-gold-400);
      line-height: 1;
    }
    .error-page h1 { margin-top: var(--sp-2); font-size: var(--fs-2xl); }
    .error-page p { margin-top: var(--sp-2); color: var(--text-inverse-soft); max-width: 46ch; margin-inline: auto; }
    .error-page .hero-actions { justify-content: center; margin-top: var(--sp-6); }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <div class="code">404</div>
      <h1>This page took a wrong turn.</h1>
      <p>The page you're looking for doesn't exist or may have moved. Let's get you back to guidance that's actually on the map.</p>
      <div class="hero-actions">
        <a href="/" class="btn btn-primary">Back to Home <span aria-hidden="true">&rarr;</span></a>
        <a href="/#contact" class="btn btn-outline">Contact Us</a>
      </div>
    </div>
  </main>
</body>
</html>
